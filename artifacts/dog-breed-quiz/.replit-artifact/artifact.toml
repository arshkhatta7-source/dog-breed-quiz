kind = "web"
previewPath = "/"
title = "DogBreedQuiz"
version = "1.0.0"
id = "artifacts/dog-breed-quiz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20410

[services.development]
run = "pnpm --filter @workspace/dog-breed-quiz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dog-breed-quiz", "run", "build" ]
publicDir = "artifacts/dog-breed-quiz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20410"
BASE_PATH = "/"
